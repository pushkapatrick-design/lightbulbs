<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Light Bulbs</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    #sl-wrapper {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #1e293b, #0f172a);
    }
    
    #sl-stage {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      position: relative;
    }
    
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="sl-wrapper">
    <div id="sl-stage">
      <div id="root"></div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const { motion, useMotionValue, useTransform } = window.MotionReact || window.Motion;

    function LightBulbString({ index }) {
      const [isOn, setIsOn] = useState(false);
      const [isPulling, setIsPulling] = useState(false);
      const pullY = useMotionValue(0);
      const constraintsRef = useRef(null);
      
      const stringPath = useTransform(pullY, (y) => {
        if (isPulling && y > 5) {
          // Create a bouncy curved path when pulling
          const amplitude = Math.min(y * 0.3, 20); // Bounce amplitude increases with pull
          const midY = (32 + y) / 2;
          return `M 20 0 Q ${20 + amplitude} ${midY} 20 ${32 + y}`;
        }
        return `M 20 0 L 20 ${32 + y}`;
      });
      
      const handleDragStart = () => {
        setIsPulling(true);
      };
      
      const handleDragEnd = (_event, info) => {
        setIsPulling(false);
        
        if (info.point.y > 60) {
          setIsOn(!isOn);
        }
      };

      return (
        <div className="flex flex-col items-center relative" ref={constraintsRef}>
          {/* Cloud with text - appears when bulb is on */}
          {isOn && (
            <motion.div
              className="absolute pointer-events-none z-50"
              style={{ top: '-128px', left: '50%', transform: 'translateX(-50%)' }}
              initial={{ y: 20, opacity: 0, scale: 0.5 }}
              animate={{ y: 0, opacity: 1, scale: 1 }}
              exit={{ y: -20, opacity: 0, scale: 0.5 }}
              transition={{ duration: 0.4, ease: "easeOut" }}
            >
              <div style={{ position: 'relative' }}>
                <svg width="200" height="100" viewBox="0 0 200 100">
                  <ellipse cx="100" cy="57" rx="63" ry="37" fill="#FFD700" opacity="0.9" />
                  <ellipse cx="63" cy="50" rx="44" ry="31" fill="#FFE55C" opacity="0.85" />
                  <ellipse cx="137" cy="50" rx="50" ry="35" fill="#FFED4E" opacity="0.85" />
                  <ellipse cx="100" cy="37" rx="37" ry="25" fill="#FFF9E6" opacity="0.8" />
                </svg>
                <div style={{ 
                  position: 'absolute', 
                  inset: 0, 
                  display: 'flex', 
                  alignItems: 'center', 
                  justifyContent: 'center' 
                }}>
                  <span style={{ 
                    fontSize: '1.875rem', 
                    fontWeight: 'bold', 
                    color: '#78350f',
                    textShadow: '0 2px 4px rgba(255,255,255,0.8)'
                  }}>
                    Great!
                  </span>
                </div>
              </div>
            </motion.div>
          )}
          
          {/* Light Bulb */}
          <motion.div 
            style={{ position: 'relative' }}
            animate={{ 
              scale: isPulling ? 0.95 : 1,
            }}
            transition={{ type: "spring", stiffness: 300, damping: 20 }}
          >
            <motion.div 
              style={{
                width: '128px',
                height: '160px',
                borderRadius: '50%',
                position: 'relative',
                marginTop: '-8px',
                background: isOn 
                  ? 'radial-gradient(circle at 50% 40%, #fff9e6 0%, #ffd700 40%, #ffed4e 70%, rgba(255,237,78,0.4) 100%)'
                  : 'radial-gradient(circle at 50% 40%, #e8e8e8 0%, #c0c0c0 50%, #909090 100%)',
                boxShadow: isOn 
                  ? '0 0 60px rgba(255, 215, 0, 0.8), inset 0 -30px 60px rgba(255, 215, 0, 0.3)'
                  : '0 8px 30px rgba(0,0,0,0.2), inset 0 -30px 60px rgba(0,0,0,0.1)',
              }}
              animate={{
                filter: isOn ? 'brightness(1.2)' : 'brightness(1)',
              }}
              transition={{ duration: 0.3 }}
            >
              {/* Filament */}
              <motion.div 
                style={{
                  position: 'absolute',
                  left: '50%',
                  top: '40px',
                  width: '40px',
                  height: '64px',
                  marginLeft: '-20px'
                }}
                animate={{
                  opacity: isOn ? 1 : 0.3,
                }}
              >
                <svg viewBox="0 0 40 60" style={{ width: '100%', height: '100%' }}>
                  <path
                    d="M 20 5 Q 15 15, 20 25 Q 25 35, 20 45 Q 15 50, 20 55"
                    stroke={isOn ? "#ff6600" : "#666"}
                    strokeWidth="2.5"
                    fill="none"
                    strokeLinecap="round"
                  />
                </svg>
              </motion.div>
              
              {/* Glow effect when on */}
              {isOn && (
                <motion.div
                  style={{
                    position: 'absolute',
                    inset: 0,
                    borderRadius: '50%',
                    background: 'radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.8) 0%, rgba(255, 215, 0, 0.4) 40%, transparent 70%)',
                  }}
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  transition={{ duration: 0.2 }}
                />
              )}
              
              {/* Shine effect */}
              <div 
                style={{
                  position: 'absolute',
                  top: '24px',
                  left: '32px',
                  width: '40px',
                  height: '56px',
                  borderRadius: '50%',
                  background: 'radial-gradient(ellipse at 30% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 50%)',
                  transform: 'rotate(-20deg)',
                }}
              />
            </motion.div>
          </motion.div>
          
          {/* String with natural curve */}
          <div style={{ position: 'relative', width: '8px', height: '160px' }}>
            <svg
              width="60"
              height="250"
              viewBox="0 0 60 250"
              style={{ 
                position: 'absolute', 
                left: '50%', 
                transform: 'translateX(-50%)', 
                top: 0,
                overflow: 'visible'
              }}
            >
              <motion.path
                d={stringPath}
                stroke={isPulling ? "#8B4513" : "#654321"}
                strokeWidth="4"
                fill="none"
                strokeLinecap="round"
              />
            </svg>
          
            {/* Pull Knob */}
            <motion.div
              drag="y"
              dragConstraints={{ top: 0, bottom: 140 }}
              dragElastic={0.2}
              onDragStart={handleDragStart}
              onDragEnd={handleDragEnd}
              style={{ 
                y: pullY,
                width: '64px',
                height: '64px',
                borderRadius: '50%',
                cursor: 'grab',
                position: 'absolute',
                top: '20px',
                left: '50%',
                transform: 'translateX(-50%)',
              }}
              whileHover={{ scale: 1.1 }}
              whileTap={{ scale: 0.95, cursor: 'grabbing' }}
              animate={{
                background: isPulling
                  ? 'radial-gradient(circle at 40% 40%, #8B4513 0%, #654321 50%, #4a3319 100%)'
                  : 'radial-gradient(circle at 40% 40%, #a0522d 0%, #8B4513 50%, #654321 100%)',
                boxShadow: isPulling
                  ? '0 6px 20px rgba(0,0,0,0.4), inset -3px -3px 6px rgba(0,0,0,0.3)'
                  : '0 10px 25px rgba(0,0,0,0.3), inset -3px -3px 6px rgba(0,0,0,0.2)',
              }}
              transition={{ 
                type: "spring", 
                stiffness: 300, 
                damping: 20 
              }}
            >
              {/* Wood grain texture */}
              <div style={{ 
                position: 'absolute', 
                inset: 0, 
                borderRadius: '50%', 
                overflow: 'hidden', 
                opacity: 0.3 
              }}>
                <div style={{
                  position: 'absolute',
                  inset: 0,
                  backgroundImage: 'repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 6px)',
                }} />
              </div>
              
              {/* Highlight */}
              <div 
                style={{
                  position: 'absolute',
                  top: '8px',
                  left: '12px',
                  width: '24px',
                  height: '24px',
                  borderRadius: '50%',
                  background: 'radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4) 0%, transparent 70%)',
                }}
              />
            </motion.div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <div style={{ 
          width: '100%', 
          height: '100%', 
          display: 'flex', 
          alignItems: 'center', 
          justifyContent: 'center',
          background: 'linear-gradient(to bottom, #1e293b, #0f172a)',
          padding: '16px'
        }}>
          <div style={{ 
            display: 'flex', 
            gap: '80px', 
            alignItems: 'flex-start' 
          }}>
            <LightBulbString index={0} />
            <LightBulbString index={1} />
            <LightBulbString index={2} />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    // Storyline responsive scaler
    (function() {
      const wrapper = document.getElementById('sl-wrapper');
      const stage = document.getElementById('sl-stage');
      const DESIGN_WIDTH = 1920;
      const DESIGN_HEIGHT = 1080;

      function scaleStage() {
        const iframeW = wrapper.clientWidth;
        const iframeH = wrapper.clientHeight;
        
        // Calculate scale to fit the design in the iframe
        const scaleX = iframeW / DESIGN_WIDTH;
        const scaleY = iframeH / DESIGN_HEIGHT;
        const scale = Math.min(scaleX, scaleY);
        
        // Apply the scale
        stage.style.transform = `scale(${scale})`;
      }

      // Scale on load
      scaleStage();

      // Scale on resize using ResizeObserver
      if (typeof ResizeObserver !== 'undefined') {
        const resizeObserver = new ResizeObserver(scaleStage);
        resizeObserver.observe(wrapper);
      } else {
        // Fallback for older browsers
        window.addEventListener('resize', scaleStage);
      }
    })();
  </script>
</body>
</html>
